name: Build and Release

on:
  push:
    tags:
      - 'v*' # Spustí se při pushnutí tagu začínajícího na 'v' (např. v1.0.1)

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Důležité pro generování changelogu z historie

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Tady nastavujeme tvůj .NET 10

    - name: Publish AdminDiskApp
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish

    - name: Create Release and Upload Artifact
      uses: softprops/action-gh-release@v2
      with:
        files: ./publish/AdminDiskApp.exe
        generate_release_notes: true # Tady se děje to kouzlo s changelogem
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}